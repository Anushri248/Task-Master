services:
  - type: web
    name: task-master-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # You will set this manually in Render dashboard
      - key: PORT
        value: 10000
